<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SOCHE Hotel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        
        <!-- LEFT SIDE BANNER WITH ACTIVE HOME REDIRECT -->
        <div class="login-banner">
            <div class="banner-text">
                <h2>Welcome Back to <span>SOCHE</span></h2>
                <p>Log in to access your dashboard, manage reservations, and experience personalized luxury hospitality services.</p>
                <a href="index.html" class="btn-back-home">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>

        <!-- RIGHT SIDE AUTHENTICATION BOX -->
        <div class="login-form-box">
            <div class="form-header">
                <h3>Account Login</h3>
                <p>Welcome back! Please enter your credentials.</p>
            </div>

            <form action="#" method="POST" class="form-element">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="johndoe@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <div class="forgot-pass">
                        <a href="#">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Log In</button>
            </form>

            <div class="form-footer">
                <p>New to SOCHE Hotel? <a href="signup.html">Create an account</a></p>
            </div>
        </div>

    </div>

</body>
</html>
