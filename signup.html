<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SOCHE Hotel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <div class="signup-container">
        
        <!-- LEFT SIDE BANNER WITH ACTIVE HOME REDIRECT -->
        <div class="signup-banner">
            <div class="banner-text">
                <h2>SOCHE <span>HOTEL</span></h2>
                <p>Join our exclusive loyalty program to unlock premium rewards, complimentary stays, and tailored hospitality experiences.</p>
                <a href="index.html" class="btn-back-home">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>

        <!-- RIGHT SIDE REGISTRATION BOX -->
        <div class="signup-form-box">
            <div class="form-header">
                <h3>Create Account</h3>
                <p>Please fill in this form to create your account.</p>
            </div>

            <form action="#" method="POST" class="form-element">
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <div class="input-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="johndoe@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="terms-condition">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-submit">Sign Up</button>
            </form>

            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>

    </div>

</body>
</html>
